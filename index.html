<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Firebase App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-view" class="container">
    <!-- Login Section -->
    <div id="login-section" class="auth-box">
      <h1>Welcome Back 🍔</h1>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
      <p class="toggle-text">Don't have an account? <a href="#" id="to-signup">Sign Up</a></p>
    </div>

    <!-- Signup Section -->
    <div id="signup-section" class="auth-box hidden">
      <h1>Join Thompson's 🍟</h1>
      <input type="text" id="signup-name" placeholder="Full Name">
      <input type="tel" id="signup-phone" placeholder="Phone Number">
      <input type="email" id="signup-email" placeholder="Email">
      <input type="password" id="signup-password" placeholder="Password">
      <button id="signup-btn">Create Account</button>
      <p class="toggle-text">Already have an account? <a href="#" id="to-login">Login</a></p>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-view" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Restaurant App</h2>
      <button id="logout-btn" style="width:auto; background:#333;">Logout</button>
    </div>
    
    <nav>
      <button id="nav-menu" class="active">Menu</button>
      <button id="nav-cart">Cart (<span id="cart-count">0</span>)</button>
      <button id="nav-orders">My Orders</button>
    </nav>

    <main id="main-content">
      <!-- Content injected here by JS -->
    </main>
  
    <!-- Templates for different views can be handled in JS or hidden divs -->
    <div id="cart-actions" class="hidden" style="margin-top:20px; text-align:right;">
      <button id="place-order-btn">Place Order</button>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initAuth, login, signup, logoutUser } from './js/auth.js';
    import { loadMenu } from './js/menu.js';
    import { renderCart, removeFromCart } from './js/cart.js';
    import { placeOrder, loadOrders } from './js/orders.js';
    import { seedMenu } from './js/seed.js';

    // DOM Elements
    const views = {
      auth: document.getElementById('auth-view'),
      dash: document.getElementById('dashboard-view'),
      loginSection: document.getElementById('login-section'),
      signupSection: document.getElementById('signup-section')
    };
    const main = document.getElementById('main-content');
    const cartActions = document.getElementById('cart-actions');

    // View Toggles
    document.getElementById('to-signup').onclick = (e) => {
      e.preventDefault();
      views.loginSection.classList.add('hidden');
      views.signupSection.classList.remove('hidden');
    };
    document.getElementById('to-login').onclick = (e) => {
      e.preventDefault();
      views.signupSection.classList.add('hidden');
      views.loginSection.classList.remove('hidden');
    };

    // Event Listeners
    document.getElementById('login-btn').onclick = () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      login(email, pass);
    };

    document.getElementById('signup-btn').onclick = () => {
      const name = document.getElementById('signup-name').value;
      const phone = document.getElementById('signup-phone').value;
      const email = document.getElementById('signup-email').value;
      const pass = document.getElementById('signup-password').value;
      signup(email, pass, name, phone);
    };

    document.getElementById('logout-btn').onclick = logoutUser;
    document.getElementById('place-order-btn').onclick = placeOrder;

    // Navigation logic
    const navs = {
      menu: document.getElementById('nav-menu'),
      cart: document.getElementById('nav-cart'),
      orders: document.getElementById('nav-orders')
    };

    function setActive(viewName) {
      Object.values(navs).forEach(b => b.classList.remove('active'));
      navs[viewName].classList.add('active');
      main.innerHTML = '';
      cartActions.classList.add('hidden');

      if (viewName === 'menu') {
        const div = document.createElement('div'); div.id = 'menu-container'; main.appendChild(div);
        loadMenu('menu-container');
      } else if (viewName === 'cart') {
        const div = document.createElement('div'); div.id = 'cart-container'; main.appendChild(div);
        renderCart('cart-container');
        cartActions.classList.remove('hidden');
        // Rebind dynamic removes
        div.onclick = (e) => { if(e.target.classList.contains('remove-btn')) removeFromCart(e.target.dataset.idx); renderCart('cart-container'); }
      } else if (viewName === 'orders') {
        const div = document.createElement('div'); div.id = 'orders-container'; main.appendChild(div);
        loadOrders('orders-container');
      }
    }

    Object.keys(navs).forEach(k => navs[k].onclick = () => setActive(k));
    
    // Cart Count Listener
    document.addEventListener('cart-updated', () => {
      const cart = JSON.parse(localStorage.getItem('cart')||'[]');
      document.getElementById('cart-count').textContent = cart.reduce((a,b)=>a+b.qty,0);
    });

    // Auth State
    initAuth(async (user, role) => {
      if (user) {
        await seedMenu(); // Seed if empty
        if (role === 'admin') {
          window.location.href = 'admin.html';
          return;
        }
        views.auth.classList.add('hidden');
        views.dash.classList.remove('hidden');
        setActive('menu');
      } else {
        views.auth.classList.remove('hidden');
        views.dash.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
