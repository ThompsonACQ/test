<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thompson's Restaurant - Order Now! 🍔</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Dashboard Screen -->
  <div id="dashboard-view" class="container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h1>Thompson's c🍔🍔k</h1>
      <div>
        <span id="user-display" style="margin-right:15px; color:#555;"></span>
        <button id="logout-btn" style="width:auto; background:#333; padding:10px 20px;">Logout</button>
      </div>
    </header>

    <nav>
      <button id="nav-menu" class="active">🍽️ Menu</button>
      <button id="nav-cart">🛒 Cart (<span id="cart-count">0</span>)</button>
      <button id="nav-orders">📦 My Orders</button>
    </nav>

    <main id="main-content">
      <!-- Content injected here by JS -->
    </main>

    <div id="cart-actions" class="hidden" style="margin-top:20px; text-align:right;">
      <button id="place-order-btn">Place Order 🚀</button>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initAuth, logoutUser } from './js/auth.js';
    import { loadMenu, renderCart, placeOrder, loadOrders } from './js/app.js';
    import { seedMenu } from './js/seed.js';

    const main = document.getElementById('main-content');
    const cartActions = document.getElementById('cart-actions');
    const userDisplay = document.getElementById('user-display');

    // Auth Protection
    initAuth(async (user, role) => {
      if (!user) {
        window.location.replace('login.html');
      } else {
        if (role === 'admin') {
          window.location.replace('admin.html');
          return;
        }
        userDisplay.textContent = user.email;
        await seedMenu();
        setActive('menu');
      }
    });

    document.getElementById('logout-btn').onclick = () => logoutUser().then(() => window.location.replace('login.html'));
    document.getElementById('place-order-btn').onclick = placeOrder;

    const navs = {
      menu: document.getElementById('nav-menu'),
      cart: document.getElementById('nav-cart'),
      orders: document.getElementById('nav-orders')
    };

    function setActive(viewName) {
      Object.values(navs).forEach(b => b.classList.remove('active'));
      navs[viewName].classList.add('active');
      main.innerHTML = '';
      cartActions.classList.add('hidden');

      if (viewName === 'menu') {
        const div = document.createElement('div'); div.id = 'menu-container'; main.appendChild(div);
        loadMenu('menu-container');
      } else if (viewName === 'cart') {
        const div = document.createElement('div'); div.id = 'cart-container'; main.appendChild(div);
        renderCart('cart-container');
        cartActions.classList.remove('hidden');
      } else if (viewName === 'orders') {
        const div = document.createElement('div'); div.id = 'orders-container'; main.appendChild(div);
        loadOrders('orders-container');
      }
    }

    Object.keys(navs).forEach(k => navs[k].onclick = () => setActive(k));

    document.addEventListener('cart-updated', () => {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
      thon
    });
  </script>
</body>

</html>
