<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Coach Derrick's Cook Center 🥘</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div id="login-section" class="auth-box">
      <img src="img/logo.png" alt="Cook Center Logo" class="auth-logo">
      <h1>Welcome Back 🥘</h1>
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="Email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Password">
      </div>
      <button id="login-btn">Login</button>
      <p class="toggle-text"><a href="#" id="to-forgot">Forgot Password?</a></p>
      <p class="toggle-text">Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>

    <!-- Reset Password Section -->
    <div id="reset-section" class="auth-box hidden">
      <img src="img/logo.png" alt="Cook Center Logo" class="auth-logo">
      <h1>Verify Identity 🔐</h1>
      <p style="margin-bottom:20px; color:var(--text-light);">Enter your details to receive a reset link.</p>
      <div class="form-group">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" placeholder="Email">
      </div>
      <div class="form-group">
        <label for="reset-name">Full Name</label>
        <input type="text" id="reset-name" placeholder="Name">
      </div>
      <div class="form-group">
        <label for="reset-phone">Phone Number</label>
        <input type="tel" id="reset-phone" placeholder="Number">
      </div>
      <div class="form-group">
        <label for="reset-address">Address</label>
        <input type="text" id="reset-address" placeholder="Address">
      </div>
      <button id="reset-btn">Verify & Send Link</button>
      <p class="toggle-text">Remember your password? <a href="#" id="to-login-from-reset">Login</a></p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { login, verifyAndResetPassword, initAuth } from './js/auth.js';
    import { showToast } from './js/utils.js';

    // Redirect if already logged in
    initAuth((user, role) => {
      if (user) {
        if (role === 'admin' || user.email === 'admin@thompsons.com') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('index.html');
        }
      }
    });

    const views = {
        login: document.getElementById('login-section'),
        reset: document.getElementById('reset-section')
    };

    document.getElementById('to-forgot').onclick = (e) => {
      e.preventDefault();
      views.login.classList.add('hidden');
      views.reset.classList.remove('hidden');
    };

    document.getElementById('to-login-from-reset').onclick = (e) => {
      e.preventDefault();
      views.reset.classList.add('hidden');
      views.login.classList.remove('hidden');
    };

    document.getElementById('login-btn').onclick = async () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      if (!email || !pass) return showToast("Please fill all fields", "error");
      
      await login(email, pass);
      // initAuth handles redirect
    };

    document.getElementById('reset-btn').onclick = async () => {
      const email = document.getElementById('reset-email').value;
      const name = document.getElementById('reset-name').value;
      const phone = document.getElementById('reset-phone').value;
      const address = document.getElementById('reset-address').value;

      if (!email || !name || !phone || !address) {
        showToast("Please fill all fields!", 'error');
        return;
      }

      const success = await verifyAndResetPassword(email, name, phone, address);
      if (success) {
        views.reset.classList.add('hidden');
        views.login.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
