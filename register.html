<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Solicious Fastfood</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div id="signup-section" class="auth-box">
      <div class="brand-container" style="justify-content: center; margin-bottom: 30px;">
        <!-- Pure CSS Logo matching the uploaded image -->
        <div class="solicious-logo" style="margin: 0 auto; transform: scale(1.2) rotate(-2deg);">
          <div class="sol-main">Solicious</div>
          <div class="sol-sub">Fastfood</div>
        </div>
      </div>
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="Name">
      </div>
      <div class="form-group">
        <label for="signup-phone">Phone Number</label>
        <input type="tel" id="signup-phone" placeholder="Number">
      </div>
      <div class="form-group">
        <label for="signup-address">Address</label>
        <input type="text" id="signup-address" placeholder="Address">
      </div>
      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" placeholder="Email">
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Password">
      </div>
      <div class="form-group">
        <label for="signup-confirm-password">Confirm Password</label>
        <input type="password" id="signup-confirm-password" placeholder="Confirm Password">
      </div>
      <div class="form-group">
        <label for="signup-confirm-password-2">Verify Password</label>
        <input type="password" id="signup-confirm-password-2" placeholder="Confirm Password Again">
      </div>
      <button id="signup-btn">Create Account</button>
      <p class="toggle-text">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { signup, initAuth } from './js/auth.js';
    import { showToast } from './js/utils.js';

    // Redirect if already logged in
    initAuth((user, role) => {
      if (user) {
         window.location.replace('index.html');
      }
    });

    document.getElementById('signup-btn').onclick = async () => {
      const name = document.getElementById('signup-name').value;
      const phone = document.getElementById('signup-phone').value;
      const address = document.getElementById('signup-address').value;
      const email = document.getElementById('signup-email').value;
      const pass = document.getElementById('signup-password').value;
      const confirmPass = document.getElementById('signup-confirm-password').value;
      const confirmPass2 = document.getElementById('signup-confirm-password-2').value;

      if (!name || !phone || !address || !email || !pass) {
        showToast("Please fill all fields!", 'error');
        return;
      }

      if (pass !== confirmPass || pass !== confirmPass2) {
        showToast("Passwords do not match!", 'error');
        return;
      }
      
      await signup(email, pass, name, phone, address);
      // Wait a moment for Firestore doc to be created then redirect
      setTimeout(() => window.location.href = 'index.html', 1500);
    };
  </script>
</body>
</html>
